<!DOCTYPE html>

<head>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #5E7754; /* soft olive green */
        font-family: 'Inter', sans-serif;
        color: #F4F1EA;
    }

    .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 100vh;
        padding: 80px 8%;
        gap: 60px;
    }

    .left {
        max-width: 520px;
    }

    .logo {
        font-size: 22px;
        font-weight: 500;
        margin-bottom: 8px;
        font-family: 'Playfair Display', serif;
    }

    .subheading {
        font-size: 15px;
        font-weight: 300;
        opacity: 0.9;
        line-height: 1.6;
        font-family: 'DM Sans', sans-serif;
    }

    .email {
        font-size: 15px;
        font-weight: 300;
        margin-top: 10px;
        margin-bottom: 100px;
        opacity: 0.9;
        line-height: 1.6;
        font-family: 'DM Sans', sans-serif;
    }

    h1 {
        font-family: 'Playfair Display', serif;
        font-size: 72px;
        font-weight: 400;
        margin-bottom: 40px;
    }

    .description {
        font-size: 18px;
        line-height: 1.8;
        font-weight: 300;
        max-width: 450px;
        font-family: 'DM Sans', sans-serif;
    }

    .right img {
        width: 500px;
        max-width: 100%;
        border-radius: 20px;
        display: block;
    }

    .logo-narrow {
	     display: none;
    }

    /* Responsive */
    @media (max-width: 1000px) {
        .container {
            flex-direction: column;
            text-align: center;
        }

        .left {
            max-width: 100%;
        }

        h1 {
            font-size: 56px;
        }

        .subheading {
            margin-bottom: 20px;
        }

	.logo-wide {
	    display: none;
    	}

	.logo-narrow {
	    display: block;
	}

    .email {
        margin-top: 0;
    }
    }
</style>
</head>

<body>

<div class="container">
    <div class="left">
	<div class="logo logo-narrow">✻</div>
	<div class="logo logo-narrow">Nati Szántó</div>
        <div class="logo logo-wide">✻ Nati Szántó</div>
        <div class="subheading">
            Medical Personal Training<br>
            in Vienna
        </div>
        <div class="email">
            <div>
                hello@natiszanto.at
            </div>
            <div>
                +4367761511170
            </div>
        </div>

        <h1>Coming soon...</h1>

        <p class="description">
            Guiding people with chronic pain back into the freedom of an active life –
            through movement they can trust
        </p>
    </div>

    <div class="right">
        <img src="image.jpg" alt="Cycling image">
    </div>
</div>

</body>
</html>
